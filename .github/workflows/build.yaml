name: Cross-Platform CMake Ninja Build with Vulkan

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]

    steps:
    # Step 1: Check out the code
    - name: Checkout Code
      uses: actions/checkout@v4

    # Step 2: Set up Ninja build system
    - name: Setup Ninja
      uses: ashutoshvarma/setup-ninja@master
      with:
        version: 1.11.1

    # Step 3: Windows-Only Compiler Setup
    - name: Setup MSVC Environment (Windows Only)
      if: matrix.os == 'windows-latest'
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    # Step 4: Linux-Only System Dependencies (For SFML & X11/Vulkan Windowing)
    - name: Install Linux Graphics & Audio Dependencies
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libx11-dev \
          libxrandr-dev \
          libxi-dev \
          libxinerama-dev \
          libxcursor-dev \
          libudev-dev \
          libfreetype6-dev \
          libharfbuzz-dev \
          libopenal-dev \
          libsndfile1-dev \
          libflac-dev \
          libvorbis-dev \
          libgl1-mesa-dev \
          libmbedtls-dev \
          libssh2-1-dev \
          libssl-dev

    # Step 5a: Manual Vulkan Installation (Windows Only via correct URL format)
    - name: Install Vulkan SDK (Windows)
      if: matrix.os == 'windows-latest'
      uses: humbletim/setup-vulkan-sdk@v1.2.0
      with:
        # Pulls the header & library toolset directly without executing a background wizard 
        vulkan-query-version: '1.4.350.0'
        # Fetches shader tools (glslangValidator) and critical validation layers automatically
        vulkan-components: Vulkan-Headers, Vulkan-Loader, Glslang

    # Step 5b: Manual Vulkan Installation (Linux Only)
    - name: Install Vulkan SDK (Linux)
      if: matrix.os == 'ubuntu-latest'
      uses: jakoch/install-vulkan-sdk-action@v1.2.0
      with:
        vulkan_version: '1.3.296.0'
        install_runtime: false

    # Step 6: Configure CMake
    - name: Configure CMake
      run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

    # Step 7: Execute the build
    - name: Build Project
      run: cmake --build build --config Release