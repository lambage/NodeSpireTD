name: Cross-Platform CMake Ninja Build with Vulkan

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]

    steps:
    # Step 1: Check out the code
    - name: Checkout Code
      uses: actions/checkout@v4

    # Step 2: Set up CMake and Ninja build system
    - name: Setup CMake
      id: cmake-and-ninja
      uses: lukka/get-cmake@latest

    # Step 3: Windows-Only Compiler Setup
    - name: Setup MSVC Environment (Windows Only)
      if: matrix.os == 'windows-latest'
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    # Step 4: Linux-Only System Dependencies (For SFML & X11/Vulkan Windowing)
    - name: Install Linux Graphics & Audio Dependencies
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libx11-dev \
          libxrandr-dev \
          libxi-dev \
          libxinerama-dev \
          libxcursor-dev \
          libudev-dev \
          libfreetype6-dev \
          libharfbuzz-dev \
          libopenal-dev \
          libsndfile1-dev \
          libflac-dev \
          libvorbis-dev \
          libgl1-mesa-dev \
          libmbedtls-dev \
          libssh2-1-dev \
          libssl-dev

    # Step 5: Vulkan Installation
    - name: Install Vulkan SDK
      uses: SpargatGroup/setup-vulkan-sdk@v1.1.0
      with:
        version: 'latest'
        components: 'Vulkan-Headers,Vulkan-Loader,Glslang'
        cache: 'true'

    # Step 6a: Configure CMake
    - name: Configure CMake
      if: matrix.os == 'windows-latest'
      run: |
        call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\Common7\Tools\VsDevCmd.bat" -arch=x64
        "${{ steps.cmake-and-ninja.outputs.cmake-path }}cmake.exe -B build -G Ninja -DCMAKE_BUILD_TYPE=Release"
        "${{ steps.cmake-and-ninja.outputs.cmake-path }}cmake.exe --build build --config Release"
      shell: cmd    

    # Step 6b: Configure CMake (Linux)
    - name: Configure CMake
      if: matrix.os == 'ubuntu-latest'
      run: |
        cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
        cmake --build build --config Release
