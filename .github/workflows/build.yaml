name: Cross-Platform CMake Ninja Build with Vulkan

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build (Ubuntu)
    runs-on: ubuntu-latest

    steps:
    # Step 1: Check out the code
    - name: Checkout Code
      uses: actions/checkout@v4

    # Step 2: Set up CMake and Ninja build system
    - name: Setup CMake
      id: cmake-and-ninja
      uses: lukka/get-cmake@latest

    # Step 3: System Dependencies (For SFML & X11/Vulkan Windowing)
    - name: Install Linux Graphics & Audio Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libx11-dev \
          libxrandr-dev \
          libxi-dev \
          libxinerama-dev \
          libxcursor-dev \
          libudev-dev \
          libfreetype6-dev \
          libharfbuzz-dev \
          libopenal-dev \
          libsndfile1-dev \
          libflac-dev \
          libvorbis-dev \
          libgl1-mesa-dev \
          libmbedtls-dev \
          libssh2-1-dev \
          libssl-dev

    # Step 4: Vulkan Installation
    - name: Install Vulkan SDK
      uses: SpargatGroup/setup-vulkan-sdk@v1.1.0
      with:
        version: 'latest'
        components: 'Vulkan-Headers,Vulkan-Loader,Glslang'
        cache: 'true'

    # Step 5: Configure CMake
    - name: Configure CMake
      run: |
        cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
        cmake --build build --config Release
